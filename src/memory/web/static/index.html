<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mirror Web</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <a href="#workspace" class="app-logo" data-home>Mirror Mind</a>
          <div class="user-lockup" aria-label="Current Mirror user">
            <span class="user-avatar" aria-hidden="true">◇</span>
            <span id="mirror-name">Local Mirror</span>
          </div>
        </div>
        <div class="topbar-actions">
          <form class="search-placeholder" data-search-form>
            <label for="mirror-search">Search</label>
            <input id="mirror-search" type="search" name="q" placeholder="Search retained memories" />
          </form>
        </div>
      </header>

      <nav class="perspective-tabs" aria-label="Mirror perspectives">
        <button type="button" data-view="workspace">Workspace</button>
        <button type="button" data-view="atlas">Identity</button>
        <button type="button" data-view="docs">Docs</button>
      </nav>

      <div id="warning" class="warning" hidden></div>

      <section id="chooser" class="chooser" hidden>
        <p class="eyebrow">First run</p>
        <h2>Choose your default perspective</h2>
        <p>Identity is reflective and psyche-map oriented. Workspace is analytical and operational.</p>
        <div class="choice-grid">
          <button type="button" data-choose="atlas">
            <strong>Identity</strong>
            <span>Explore identity, personas, memories, and meaning.</span>
          </button>
          <button type="button" data-choose="workspace">
            <strong>Workspace</strong>
            <span>Coordinate journeys, conversations, memories, and decisions.</span>
          </button>
        </div>
      </section>

      <main class="content-grid">
        <section class="surface-panel">
          <div id="current-path" class="current-path">Loading Mirror…</div>
          <article id="content" class="surface-content">
            <p>Loading…</p>
          </article>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
